<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Let us Love Each Other Till the End</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gwendolyn:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1 class="title">Let us Love Each Other Till the End</h1>

      <p class="subheader">
        <em>What remains, even now?</em>
      </p>

      <input id="authorInput" placeholder="Your name (optional)" />

      <textarea
        id="letterInput"
        maxlength="400"
        placeholder="Write or speak your message here..."
      ></textarea>

      <p class="description">
        Please leave a message of love, hope or memory. Your words may appear in
        the growing archive and be printed.
      </p>

      <div class="button-row">
        <button id="voiceToText" aria-label="Start voice input">
          <img class="mic" src="images/mic.png" alt="a microphone icon" />
        </button>

        <button id="submitBtn">Send Message</button>
      </div>

      <p id="status" aria-live="polite"></p>
      <!-- https://developer.mozilla.org/en-US/docs/Web/Accessibility/ARIA/Reference/Attributes/aria-live -->
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
